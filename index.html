<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機相機條碼自動填入測試 V3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        h2 { text-align: center; color: #38bdf8; margin-top: 0; margin-bottom: 15px; font-size: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 12px; border: 2px solid #475569; border-radius: 6px; background: #0f172a; color: #fff; box-sizing: border-box; font-size: 16px; }
        #reader { width: 100%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .btn { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        #log { font-size: 12px; color: #e2e8f0; background: #334155; padding: 10px; border-radius: 6px; word-break: break-all; margin-top: 5px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>公司登入（智慧相容版 V3）</h2>
    
    <div id="reader"></div>
    <button class="btn" id="start-btn" onclick="startScan()">啟動相機掃描</button>

    <div class="input-group">
        <label>員工帳號</label>
        <input type="text" id="username" placeholder="等待掃碼..." readonly>
    </div>
    <div class="input-group">
        <label>登入密碼</label>
        <input type="password" id="password" placeholder="等待掃碼..." readonly>
    </div>
    
    <label>系統原始條碼內容：</label>
    <div id="log">尚未成功讀取條碼</div>
</div>

<script>
    let html5QrcodeScanner = null;

    function startScan() {
        document.getElementById('start-btn').style.display = 'none';
        
        // 寬扁形掃描框，適合一維條碼
        const config = { 
            fps: 20, 
            qrbox: function(viewfinderWidth, viewfinderHeight) {
                return { width: viewfinderWidth * 0.85, height: viewfinderHeight * 0.35 };
            },
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.CODE_128, 
                Html5QrcodeSupportedFormats.QR_CODE 
            ]
        };

        html5QrcodeScanner = new Html5Qrcode("reader");
        
        // 嘗試優先使用理想高清參數
        const highResConstraints = {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
        };
        
        // 【核心修正】雙重啟動機制
        html5QrcodeScanner.start(
            highResConstraints, 
            config,
            onScanSuccess,
            onScanFailure
        ).catch(err => {
            console.log("高清模式受限，正在自動切換至標準相容模式...", err);
            // 如果高清失敗，立刻免警告直接啟動普通基本模式（也就是你進第一版能動的模式）
            return html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config,
                onScanSuccess,
                onScanFailure
            );
        }).catch(err => {
            // 只有當普通模式也打不開（真的沒給相機權限）時，才會跳錯誤
            alert("相機啟動失敗，請確認有給予網頁相機權限！");
            document.getElementById('start-btn').style.display = 'block';
        });
    }

    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('log').innerText = decodedText;
        
        let delimiter = null;
        if (decodedText.includes('\t')) delimiter = '\t';
        else if (decodedText.includes('%09')) delimiter = '%09';
        else if (decodedText.includes(' ')) delimiter = ' ';
        else if (decodedText.includes('▯')) delimiter = '▯';
        
        if (delimiter) {
            let parts = decodedText.split(delimiter);
            let account = parts[0].trim();
            let password = parts[1].replace('%0D', '').replace('\r', '').replace('\n', '').trim();
            
            document.getElementById('username').value = account;
            document.getElementById('password').value = password;
            
            if (navigator.vibrate) navigator.vibrate(200); 
            
            html5QrcodeScanner.stop();
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('start-btn').innerText = '重新掃描';
            
            alert("成功讀取條碼！欄位已自動填入。");
        } else {
            document.getElementById('username').value = decodedText;
            alert("已讀取條碼，但中間不含跳格符號。");
        }
    }

    function onScanFailure(error) {
        // 靜默處理
    }
</script>

</body>
</html>
