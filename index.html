<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司登入條碼拍照解碼系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        h2 { text-align: center; color: #38bdf8; margin-top: 0; margin-bottom: 25px; font-size: 20px; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 12px; border: 2px solid #475569; border-radius: 6px; background: #0f172a; color: #fff; box-sizing: border-box; font-size: 16px; }
        .btn-scan { width: 100%; padding: 16px; background: #4ade80; color: #0f172a; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 25px; transition: background 0.2s; }
        .btn-scan:hover { background: #22c55e; }
        #log { font-size: 12px; color: #e2e8f0; background: #334155; padding: 10px; border-radius: 6px; word-break: break-all; margin-top: 5px; min-height: 20px; }
        #file-helper { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>公司登入（拍照解碼版）</h2>
    
    <div id="file-helper"></div>
    
    <button class="btn-scan" onclick="document.getElementById('file-input').click()">📸 點我拍照 / 上傳條碼</button>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display: none;" onchange="scanLocalFile(event)">

    <div class="input-group">
        <label>員工帳號</label>
        <input type="text" id="username" placeholder="等待拍照自動填入..." readonly>
    </div>
    <div class="input-group">
        <label>登入密碼</label>
        <input type="password" id="password" placeholder="等待拍照自動填入..." readonly>
    </div>
    
    <label>系統原始條碼內容：</label>
    <div id="log">尚未讀取條碼</div>
</div>

<script>
    // 拍照或選擇檔案後的解碼邏輯
    function scanLocalFile(event) {
        if (event.target.files.length === 0) return;
        const imageFile = event.target.files[0];
        document.getElementById('log').innerText = "圖片分析解碼中，請稍候...";
        
        const html5QrCode = new Html5Qrcode("file-helper");
        
        // 呼叫晶片分析照片
        html5QrCode.scanFile(imageFile, true)
            .then(decodedText => {
                processBarcodeData(decodedText);
            })
            .catch(err => {
                document.getElementById('log').innerText = "解碼失敗！";
                alert("照片解碼失敗！\n\n可能原因：\n1. 照片有反光糊掉\n2. 條碼在照片中太小\n\n請重新點擊，對準條碼拍一張清晰的照片。");
            });
    }

    // 解析條碼並自動填入欄位
    function processBarcodeData(decodedText) {
        document.getElementById('log').innerText = decodedText;
        
        let delimiter = null;
        if (decodedText.includes('\t')) delimiter = '\t';
        else if (decodedText.includes('%09')) delimiter = '%09';
        else if (decodedText.includes(' ')) delimiter = ' ';
        else if (decodedText.includes('▯')) delimiter = '▯';
        
        if (delimiter) {
            let parts = decodedText.split(delimiter);
            let account = parts[0].trim();
            let password = parts[1].replace('%0D', '').replace('\r', '').replace('\n', '').trim();
            
            document.getElementById('username').value = account;
            document.getElementById('password').value = password;
            
            if (navigator.vibrate) navigator.vibrate(200); // 成功時震動提示
            alert("成功讀取條碼！欄位已自動填入。");
        } else {
            document.getElementById('username').value = decodedText;
            alert("已讀取條碼，但中間不含跳格符號。");
        }
    }
</script>

</body>
</html>
